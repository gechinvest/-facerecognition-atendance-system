version: '3.8'

services:
  face-security:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./dataset:/app/dataset
      - ./models:/app/models
      - ./logs:/app/logs
    environment:
      - FLASK_ENV=development
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
    restart: unless-stopped
